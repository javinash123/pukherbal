# Nginx config snippet for Pukhraj Herbals
# Add these blocks inside your server { } block

# Proxy API requests to the Node.js backend
location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Serve React frontend (SPA) - handles all sub-routes
location /pukhrajherbals/ {
    alias /var/www/html/pukhrajherbals/;
    try_files $uri $uri/ /pukhrajherbals/index.html;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}

# Cache static assets aggressively (they have hashed filenames)
location /pukhrajherbals/assets/ {
    alias /var/www/html/pukhrajherbals/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
}
