# nginx config for https://pukhrajherbals.com/
#
# Frontend  → served as static files from /var/www/pukhrajherbals/public/
# Backend   → running at localhost:6396  (node index.cjs)
# Uploads   → proxied from backend at /pukhrajherbals/api/uploads/
#
# Place this file at /etc/nginx/sites-available/pukhrajherbals.conf
# Then: sudo ln -s /etc/nginx/sites-available/pukhrajherbals.conf /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name pukhrajherbals.com www.pukhrajherbals.com;

    # Redirect HTTP → HTTPS (remove this block if not using SSL yet)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pukhrajherbals.com www.pukhrajherbals.com;

    # --- SSL certificates (Let's Encrypt / certbot) ---
    ssl_certificate     /etc/letsencrypt/live/pukhrajherbals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pukhrajherbals.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- Frontend static files ---
    root /var/www/pukhrajherbals/public;
    index index.html;

    # Long-lived cache for hashed assets (JS, CSS, images)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Backend API proxy ---
    # All /pukhrajherbals/api/* requests go to the Node.js backend
    location /pukhrajherbals/api/ {
        proxy_pass         http://127.0.0.1:6396;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large file uploads (image upload endpoint)
        client_max_body_size 20M;
    }

    # --- SPA fallback ---
    # Any path not matched above returns index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
